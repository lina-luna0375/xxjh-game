<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>笑傲江湖 · 碎片合成</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#0d0602;color:#f0e6d3;min-height:100vh;overflow-x:hidden;overflow-y:auto}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(139,0,0,0.12) 0%,transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(80,40,0,0.08) 0%,transparent 50%);pointer-events:none;z-index:0}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#1a0a00}
::-webkit-scrollbar-thumb{background:#8b6914;border-radius:2px}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes drawCard{0%{transform:rotateY(0) scale(0.5);opacity:0}50%{transform:rotateY(180deg) scale(1.1)}100%{transform:rotateY(360deg) scale(1);opacity:1}}
@keyframes confettiFall{0%{transform:translateY(-100vh) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes toastIn{0%{opacity:0;transform:translate(-50%,20px) scale(0.8)}100%{opacity:1;transform:translate(-50%,0) scale(1)}}
@keyframes toastOut{0%{opacity:1;transform:translate(-50%,0) scale(1)}100%{opacity:0;transform:translate(-50%,-20px) scale(0.8)}}
@keyframes shine{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
@keyframes modalIn{from{opacity:0;transform:scale(0.9) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* Layout */
.app{position:relative;z-index:1;max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.header{text-align:center;padding:16px 12px 10px;border-bottom:1px solid rgba(212,168,67,0.12);flex-shrink:0}
.header h1{font-size:22px;font-weight:700;letter-spacing:6px;background:linear-gradient(135deg,#f0e6d3,#d4a843,#f0e6d3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .sub{font-size:11px;color:#6a5a4a;letter-spacing:3px;margin-top:2px}
.header .stats{display:flex;justify-content:center;gap:20px;margin-top:8px;font-size:12px;flex-wrap:wrap}
.header .stats span{color:#7a6a5a}
.header .stats em{font-style:normal;color:#d4a843;font-weight:700}

/* Draw */
.draw-area{flex-shrink:0;text-align:center;padding:12px 12px 8px;border-bottom:1px solid rgba(212,168,67,0.08)}
.draw-btns{display:flex;justify-content:center;gap:10px}
.draw-btn{position:relative;padding:0 24px;height:44px;border:2px solid #d4a843;border-radius:22px;background:linear-gradient(135deg,rgba(180,50,30,0.3),rgba(139,0,0,0.4));color:#f0e6d3;font-size:16px;font-weight:700;letter-spacing:3px;cursor:pointer;transition:all .3s;overflow:hidden;flex:1;max-width:160px}
.draw-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(212,168,67,0.12),transparent);background-size:200% 100%;animation:shimmer 3s infinite}
.draw-btn:hover{background:linear-gradient(135deg,rgba(180,50,30,0.5),rgba(139,0,0,0.6));box-shadow:0 0 20px rgba(212,168,67,0.2);transform:translateY(-2px)}
.draw-btn:active{transform:translateY(0)}
.draw-btn:disabled{opacity:0.35;cursor:not-allowed;transform:none;box-shadow:none}
.draw-btn .sub{display:block;font-size:10px;font-weight:400;letter-spacing:1px;color:#8b7355;margin-top:-2px}
.draw-btn.x10{border-color:#b8860b;background:linear-gradient(135deg,rgba(180,50,30,0.4),rgba(139,0,0,0.5))}
.draw-btn.x10::after{content:'★';position:absolute;top:-2px;right:6px;font-size:10px;color:#d4a843}

/* Draw result popup */
.draw-popup{display:none;position:fixed;inset:0;z-index:90;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;animation:fadeIn .25s}
.draw-popup.show{display:flex}
.draw-popup .inner{background:linear-gradient(145deg,rgba(30,15,5,0.97),rgba(20,10,3,0.99));border:1px solid rgba(212,168,67,0.3);border-radius:16px;padding:20px;max-width:380px;width:90%;max-height:80vh;overflow-y:auto}
.draw-popup .d-title{text-align:center;font-size:16px;letter-spacing:3px;color:#8b7355;margin-bottom:12px}
.draw-popup .d-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-bottom:12px}
.draw-popup .d-card{text-align:center;padding:10px 6px;border-radius:10px;border:1px solid rgba(212,168,67,0.12);background:rgba(20,10,3,0.6);animation:drawCard .4s ease both}
.draw-popup .d-card .emoji{font-size:28px;margin-bottom:4px}
.draw-popup .d-card .dname{font-size:11px;font-weight:600}
.draw-popup .d-card .drarity{font-size:9px;margin-top:2px}
.draw-popup .d-card.lgd{border-color:rgba(212,168,67,0.5);background:rgba(40,20,5,0.8)}
.draw-popup .d-card.lgd .drarity{color:#d4a843}
.draw-popup .d-card.rare{border-color:rgba(107,79,168,0.5);background:rgba(25,15,45,0.8)}
.draw-popup .d-card.rare .drarity{color:#b898e8}
.draw-popup .d-card.cmn{border-color:rgba(90,122,90,0.3)}
.draw-popup .d-card.cmn .drarity{color:#8aba8a}
.draw-popup .d-close{padding:8px 30px;border:1px solid rgba(212,168,67,0.3);border-radius:8px;background:rgba(30,15,5,0.6);color:#8b7355;font-size:14px;cursor:pointer;transition:.2s;display:block;margin:0 auto}
.draw-popup .d-close:hover{color:#f0e6d3;border-color:rgba(212,168,67,0.6)}

/* Fragment inventory bar */
.inv-bar{flex-shrink:0;display:flex;gap:3px;padding:6px 12px;overflow-x:auto;justify-content:center;flex-wrap:wrap;border-bottom:1px solid rgba(212,168,67,0.06)}
.inv-bar .inv-i{width:28px;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;transition:transform .15s;cursor:default}
.inv-bar .inv-i:hover{transform:scale(1.2)}
.inv-bar .inv-i.lgd{background:linear-gradient(135deg,#d4a843,#8b6914);color:#1a0a00;border:1px solid rgba(212,168,67,0.4)}
.inv-bar .inv-i.rare{background:linear-gradient(135deg,#6b4fa8,#48347a);color:#e0d0ff;border:1px solid rgba(107,79,168,0.4)}
.inv-bar .inv-i.cmn{background:linear-gradient(135deg,#5a7a5a,#3a5a3a);color:#c0e0c0;border:1px solid rgba(90,122,90,0.3)}
.inv-empty{color:#4a3a2a;font-size:11px;text-align:center;padding:4px}

/* Tab bar */
.tab-bar{display:flex;flex-shrink:0;background:rgba(15,8,3,0.9);border-bottom:1px solid rgba(212,168,67,0.08)}
.tab-btn{flex:1;padding:10px 0;text-align:center;font-size:13px;font-weight:600;letter-spacing:2px;color:#5a4a3a;cursor:pointer;transition:all .2s;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none}
.tab-btn:hover{color:#8b7355}
.tab-btn.active{color:#d4a843;border-bottom-color:#d4a843;background:rgba(212,168,67,0.04)}

/* Content area */
.content{flex:1;overflow-y:auto;padding:0 0 100px;position:relative}
.tab-panel{display:none;padding:10px 10px 0;animation:fadeInUp .3s ease}
.tab-panel.active{display:block}

/* Character grid (人物 tab) */
.char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.char-card{background:linear-gradient(145deg,rgba(25,12,4,0.95),rgba(18,8,2,0.98));border:1px solid rgba(212,168,67,0.1);border-radius:10px;padding:10px 8px;text-align:center;cursor:pointer;transition:all .3s;animation:fadeInUp .3s ease both;position:relative}
.char-card:hover{border-color:rgba(212,168,67,0.3);transform:translateY(-3px);box-shadow:0 6px 16px rgba(0,0,0,0.4)}
.char-card .av{width:48px;height:48px;border-radius:50%;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-size:22px;border:2px solid rgba(212,168,67,0.2);background:rgba(20,10,3,0.6);position:relative}
.char-card .av.lgd{border-color:#d4a843;box-shadow:0 0 10px rgba(212,168,67,0.15)}
.char-card .av.rare{border-color:#6b4fa8;box-shadow:0 0 8px rgba(107,79,168,0.1)}
.char-card .nm{font-size:13px;font-weight:700}
.char-card .tt{font-size:9px;color:#5a4a3a;margin-bottom:4px}
.char-card .pb{height:3px;background:rgba(255,255,255,0.05);border-radius:2px;margin:4px 6px 2px;overflow:hidden}
.char-card .pb .pf{height:100%;border-radius:2px;transition:width .4s}
.char-card .pb .pf.lgd{background:linear-gradient(90deg,#8b6914,#d4a843)}
.char-card .pb .pf.rare{background:linear-gradient(90deg,#48347a,#8b6fc8)}
.char-card .pb .pf.cmn{background:linear-gradient(90deg,#3a5a3a,#7aaa7a)}
.char-card .ct{font-size:11px;color:#6a5a4a}
.char-card .ct em{font-style:normal;color:#d4a843;font-weight:700}
.char-card .synth-badge{position:absolute;top:5px;right:5px;background:linear-gradient(135deg,#d4a843,#b8860b);color:#1a0a00;font-size:8px;font-weight:700;padding:1px 5px;border-radius:5px;letter-spacing:1px}
.char-card .syn{display:none;margin-top:5px;padding:3px 12px;font-size:11px;font-weight:700;letter-spacing:1px;border:none;border-radius:5px;cursor:pointer;transition:.2s;animation:pulse 1.5s infinite}
.char-card .syn.show{display:inline-block}
.char-card .syn.lgd{background:linear-gradient(135deg,#d4a843,#b8860b);color:#1a0a00}
.char-card .syn.rare{background:linear-gradient(135deg,#8b6fc8,#6b4fa8);color:#f0e6d3}
.char-card .syn.cmn{background:linear-gradient(135deg,#7aaa7a,#5a8a5a);color:#1a0a00}
.char-card .syn:hover{filter:brightness(1.2);transform:scale(1.05)}
.empty-msg{text-align:center;padding:30px 16px;color:#3a2a1a;font-size:13px}

/* Shop (商店 tab) */
.shop-grid{display:grid;gap:10px;padding-top:4px}
.shop-item{display:flex;align-items:center;gap:12px;background:linear-gradient(145deg,rgba(25,12,4,0.95),rgba(18,8,2,0.98));border:1px solid rgba(212,168,67,0.1);border-radius:10px;padding:12px}
.shop-item .s-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.shop-item .s-icon.gold{background:linear-gradient(135deg,rgba(212,168,67,0.2),rgba(139,105,20,0.2));border:1px solid rgba(212,168,67,0.3)}
.shop-item .s-icon.purple{background:linear-gradient(135deg,rgba(107,79,168,0.2),rgba(72,52,122,0.2));border:1px solid rgba(107,79,168,0.3)}
.shop-item .s-info{flex:1}
.shop-item .s-info .sn{font-size:14px;font-weight:700}
.shop-item .s-info .sd{font-size:11px;color:#5a4a3a;margin-top:2px}
.shop-item .s-btn{padding:6px 14px;border:1px solid rgba(212,168,67,0.3);border-radius:6px;background:rgba(212,168,67,0.08);color:#d4a843;font-size:12px;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap}
.shop-item .s-btn:hover{background:rgba(212,168,67,0.2)}
.shop-item .s-btn:disabled{opacity:0.3;cursor:not-allowed}
.shop-score{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;font-size:14px;color:#8b7355}
.shop-score em{font-style:normal;color:#d4a843;font-weight:700}

/* Missions (任务 tab) */
.mission-list{display:flex;flex-direction:column;gap:8px;padding-top:4px}
.mission-item{display:flex;align-items:center;gap:10px;background:linear-gradient(145deg,rgba(25,12,4,0.95),rgba(18,8,2,0.98));border:1px solid rgba(212,168,67,0.08);border-radius:10px;padding:12px}
.mission-item .m-icon{font-size:24px;width:36px;text-align:center;flex-shrink:0}
.mission-item .m-info{flex:1}
.mission-item .m-info .mn{font-size:14px;font-weight:600}
.mission-item .m-info .md{font-size:11px;color:#5a4a3a}
.mission-item .m-info .mp{height:3px;background:rgba(255,255,255,0.05);border-radius:2px;margin-top:6px;overflow:hidden;max-width:200px}
.mission-item .m-info .mp .mf{height:100%;background:linear-gradient(90deg,#8b6914,#d4a843);border-radius:2px;transition:width .4s}
.mission-item .m-reward{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;white-space:nowrap}
.mission-item .m-reward.pending{background:rgba(212,168,67,0.1);color:#d4a843;border:1px solid rgba(212,168,67,0.2);cursor:pointer}
.mission-item .m-reward.pending:hover{background:rgba(212,168,67,0.2)}
.mission-item .m-reward.done{background:rgba(90,122,90,0.1);color:#5a8a5a;border:1px solid rgba(90,122,90,0.15);cursor:default}
.mission-item .m-reward.locked{background:rgba(60,40,30,0.2);color:#3a2a1a;border:1px solid rgba(60,40,30,0.1);cursor:default}

/* Achievements (成就 tab) */
.achievement-list{display:flex;flex-direction:column;gap:8px;padding-top:4px}
.achi-item{display:flex;align-items:center;gap:10px;background:linear-gradient(145deg,rgba(25,12,4,0.95),rgba(18,8,2,0.98));border:1px solid rgba(212,168,67,0.08);border-radius:10px;padding:12px;transition:.3s}
.achi-item.done{border-color:rgba(212,168,67,0.3);background:linear-gradient(145deg,rgba(30,15,5,0.95),rgba(25,12,4,0.98))}
.achi-item .a-icon{font-size:24px;width:36px;text-align:center;flex-shrink:0}
.achi-item .a-icon.locked{filter:grayscale(1);opacity:0.4}
.achi-item .a-info{flex:1}
.achi-item .a-info .an{font-size:14px;font-weight:600}
.achi-item .a-info .an.done{color:#d4a843}
.achi-item .a-info .ad{font-size:11px;color:#5a4a3a}
.achi-item .a-badge{font-size:11px;color:#8b7355;white-space:nowrap}
.achi-item .a-badge em{font-style:normal;color:#d4a843;font-weight:700}

/* Gallery */
.gallery{border-top:1px solid rgba(212,168,67,0.06);padding:12px 10px 20px;margin-top:8px}
.gallery h4{text-align:center;font-size:13px;letter-spacing:3px;color:#5a4a3a;margin-bottom:10px}
.gallery .g-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.gallery .g-item{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;border:2px solid rgba(212,168,67,0.3);background:linear-gradient(135deg,rgba(25,12,4,0.9),rgba(20,10,3,0.95));transition:transform .15s;position:relative}
.gallery .g-item:hover{transform:scale(1.1)}
.gallery .g-item .gl{position:absolute;bottom:-16px;font-size:8px;color:#5a4a3a;white-space:nowrap}

/* Character detail modal */
.modal-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.75);align-items:center;justify-content:center;padding:16px;animation:fadeIn .25s}
.modal-overlay.show{display:flex}
.modal-box{background:linear-gradient(145deg,rgba(30,15,5,0.98),rgba(15,8,3,0.99));border:1px solid rgba(212,168,67,0.25);border-radius:14px;max-width:380px;width:100%;max-height:90vh;overflow-y:auto;animation:modalIn .3s ease;padding:0}
.modal-box .m-head{text-align:center;padding:20px 16px 12px;border-bottom:1px solid rgba(212,168,67,0.08);position:relative}
.modal-box .m-close{position:absolute;top:10px;right:12px;background:none;border:none;color:#5a4a3a;font-size:20px;cursor:pointer;padding:4px 8px;border-radius:4px;transition:.2s}
.modal-box .m-close:hover{color:#f0e6d3;background:rgba(255,255,255,0.05)}
.modal-box .m-av{width:64px;height:64px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:30px;border:3px solid rgba(212,168,67,0.3);background:rgba(20,10,3,0.6)}
.modal-box .m-av.lgd{border-color:#d4a843;box-shadow:0 0 15px rgba(212,168,67,0.2)}
.modal-box .m-av.rare{border-color:#6b4fa8;box-shadow:0 0 12px rgba(107,79,168,0.15)}
.modal-box .m-av.cmn{border-color:#5a7a5a}
.modal-box .m-nm{font-size:20px;font-weight:700;letter-spacing:2px}
.modal-box .m-tt{font-size:12px;color:#6a5a4a;margin-top:2px}
.modal-box .m-rarity{display:inline-block;font-size:11px;padding:2px 10px;border-radius:10px;margin-top:6px}
.modal-box .m-rarity.lgd{background:rgba(212,168,67,0.15);color:#d4a843;border:1px solid rgba(212,168,67,0.3)}
.modal-box .m-rarity.rare{background:rgba(107,79,168,0.15);color:#b898e8;border:1px solid rgba(107,79,168,0.3)}
.modal-box .m-rarity.cmn{background:rgba(90,122,90,0.15);color:#8aba8a;border:1px solid rgba(90,122,90,0.2)}
.modal-box .m-body{padding:14px 16px}
.modal-box .m-stat{display:flex;justify-content:center;gap:16px;margin-bottom:12px;font-size:13px}
.modal-box .m-stat span{color:#7a6a5a}
.modal-box .m-stat em{font-style:normal;color:#d4a843;font-weight:700}
.modal-box .m-skill{background:rgba(212,168,67,0.04);border:1px solid rgba(212,168,67,0.08);border-radius:8px;padding:10px 12px;margin-bottom:10px}
.modal-box .m-skill .sk{font-size:13px;font-weight:700;color:#d4a843}
.modal-box .m-skill .skd{font-size:11px;color:#7a6a5a;margin-top:4px;line-height:1.5}
.modal-box .m-desc{font-size:12px;color:#7a6a5a;line-height:1.6;margin-bottom:10px;font-style:italic}
.modal-box .m-synth{padding:8px 24px;border:none;border-radius:8px;font-size:15px;font-weight:700;letter-spacing:3px;cursor:pointer;transition:.3s;margin:0 auto;display:block;width:fit-content}
.modal-box .m-synth.lgd{background:linear-gradient(135deg,#d4a843,#b8860b);color:#1a0a00}
.modal-box .m-synth.rare{background:linear-gradient(135deg,#8b6fc8,#6b4fa8);color:#f0e6d3}
.modal-box .m-synth.cmn{background:linear-gradient(135deg,#7aaa7a,#5a8a5a);color:#1a0a00}
.modal-box .m-synth:disabled{opacity:0.3;cursor:not-allowed;animation:none}
.modal-box .m-synth:not(:disabled):hover{filter:brightness(1.2);transform:scale(1.05)}
.modal-box .m-synth.ok{animation:pulse 1.5s infinite}
.modal-box .m-progress{padding:0 16px 16px;text-align:center}
.modal-box .m-pb{height:6px;background:rgba(255,255,255,0.05);border-radius:3px;margin-bottom:4px;overflow:hidden}
.modal-box .m-pb .mpf{height:100%;border-radius:3px;transition:width .5s}
.modal-box .m-pb .mpf.lgd{background:linear-gradient(90deg,#8b6914,#d4a843)}
.modal-box .m-pb .mpf.rare{background:linear-gradient(90deg,#48347a,#8b6fc8)}
.modal-box .m-pb .mpf.cmn{background:linear-gradient(90deg,#3a5a3a,#7aaa7a}
.modal-box .m-pcount{font-size:12px;color:#7a6a5a}

/* Toast */
.toast{position:fixed;top:35%;left:50%;z-index:200;transform:translate(-50%,0);padding:12px 24px;background:linear-gradient(135deg,rgba(30,15,5,0.96),rgba(20,10,3,0.98));border:1px solid #d4a843;border-radius:10px;color:#f0e6d3;font-size:16px;font-weight:700;letter-spacing:3px;box-shadow:0 0 30px rgba(212,168,67,0.15);animation:toastIn .35s ease;pointer-events:none;text-align:center}
.toast .ts{font-size:11px;font-weight:400;color:#6a5a4a;letter-spacing:1px;margin-top:2px}
.toast.out{animation:toastOut .35s ease forwards}

/* Confetti */
.confetti{position:fixed;inset:0;pointer-events:none;z-index:199;overflow:hidden}
.confetti .c{position:absolute;top:-10px;width:6px;height:6px;border-radius:2px;animation:confettiFall linear forwards}

/* Misc */
.hidden{display:none!important}
</style>
</head>
<body>

<div class="app" id="app">
  <!-- Header -->
  <div class="header">
    <h1>笑傲江湖</h1>
    <div class="sub">— 碎 片 合 成 —</div>
    <div class="stats">
      <span>碎片 <em id="statFrags">0</em></span>
      <span>人物 <em id="statChars">0</em>/21</span>
      <span>积分 <em id="statScore">0</em></span>
    </div>
  </div>

  <!-- Draw -->
  <div class="draw-area">
    <div class="draw-btns">
      <button class="draw-btn" id="btnDraw1">抽 取<span class="sub">─ 单次 ─</span></button>

function initState(){
  try{
    const s=JSON.parse(localStorage.getItem('xxjh_v2'));
    if(s){
      state.fragments=s.fragments||{};
      state.synthesized=s.synthesized||[];
      state.totalDraws=s.totalDraws||0;
      state.score=s.score||0;
      state.claimedMissions=s.claimedMissions||[];
      state.claimedAchievements=s.claimedAchievements||[];
      CHARACTERS.forEach(c=>{if(state.fragments[c.id]===undefined)state.fragments[c.id]=0});
      return;
    }
  }catch(e){}
  CHARACTERS.forEach(c=>{state.fragments[c.id]=0});
}
function saveState(){
  localStorage.setItem('xxjh_v2',JSON.stringify({
    fragments:state.fragments,synthesized:state.synthesized,
    totalDraws:state.totalDraws,score:state.score,
    claimedMissions:state.claimedMissions,claimedAchievements:state.claimedAchievements
  }));
}
function getRarity(r){return {legendary:'传说',rare:'稀有',common:'普通'}[r]||'普通'}
function getRarityClass(r){return r}

function getUnsynthesized(){
  return CHARACTERS.filter(c=>!state.synthesized.includes(c.id));
}

// ===== DRAW =====
function drawOne(){
  const pool=getUnsynthesized();
  if(pool.length===0)return null;
  const r=Math.random();
  let rc;
  if(r<RARITY_WT.legendary) rc='legendary';
  else if(r<RARITY_WT.legendary+RARITY_WT.rare) rc='rare';
  else rc='common';
  let candidates=pool.filter(c=>c.rarity===rc);
  if(candidates.length===0) candidates=pool;
  return candidates[Math.floor(Math.random()*candidates.length)];
}

function doDraw(count){
  const btn1=document.getElementById('btnDraw1'), btn10=document.getElementById('btnDraw10');
  btn1.disabled=true; btn10.disabled=true;
  const unsyn=getUnsynthesized();
  if(unsyn.length===0){
    showToast('🎉 全部收集完成！','你已经集齐了所有人');
    btn1.disabled=false; btn10.disabled=false; return;
  }
  const results=[];
  let guaranteed=false;
  for(let i=0;i<count;i++){
    const c=drawOne();
    if(c){
      if(count===10 && !guaranteed && c.rarity==='common' && i===count-1){
        // Guarantee at least rare on 10-draw
        const rarePool=unsyn.filter(x=>x.rarity!=='common' || x.rarity==='common');
        const rareOnes=CHARACTERS.filter(x=>!state.synthesized.includes(x.id) && x.rarity!=='common');
        if(rareOnes.length>0){
          const rc=rareOnes[Math.floor(Math.random()*rareOnes.length)];
          state.fragments[rc.id]=(state.fragments[rc.id]||0)+1;
          results.push(rc);
          guaranteed=true;
          continue;
        }
      }
      state.fragments[c.id]=(state.fragments[c.id]||0)+1;
      results.push(c);
    }
  }
  state.totalDraws+=count;
  saveState();
  renderAll();
  showDrawPopup(results);
  checkAutoSynth(results);
  setTimeout(()=>{btn1.disabled=false; btn10.disabled=false},300);
}

function checkAutoSynth(results){
  results.forEach(c=>{
    if(state.fragments[c.id]>=FRAGS_NEED && !state.synthesized.includes(c.id)){
      setTimeout(()=>showToast('✦ 可合成 '+c.name,'点击人物卡「合成」按钮'),600);
    }
  });
}

function showDrawPopup(results){
  const popup=document.getElementById('drawPopup');
  const grid=document.getElementById('dpGrid');
  const title=document.getElementById('dpTitle');
  title.textContent=results.length===1?'— 抽 取 结 果 —':'— 十 连 结 果 —';
  grid.innerHTML=results.map((c,i)=>`<div class="d-card ${c.rarity}" style="animation-delay:${i*0.07}s">
    <div class="emoji">${c.emoji}</div>
    <div class="dname">${c.name}</div>
    <div class="drarity">${getRarity(c.rarity)}</div>
  </div>`).join('');
  popup.classList.add('show');
}

function closeDrawPopup(){
  document.getElementById('drawPopup').classList.remove('show');
}

// ===== SYNTHESIS =====
function synthesizeCharacter(id){
  const c=CHARACTERS.find(x=>x.id===id);
  if(!c) return;
  if(state.fragments[id]<FRAGS_NEED || state.synthesized.includes(id)) return;
  state.fragments[id]-=FRAGS_NEED;
  state.synthesized.push(id);
  saveState();
  renderAll();
  fireConfetti(40);
  showToast('✦ '+c.name+' ✦','人物已合成！重置门派收集进度。');
  closeCharModal();
}

  const pool=CHARACTERS.filter(c=>!state.synthesized.includes(c.id) && c.rarity===item.rarity);
  if(pool.length===0){
    showToast('该品质已全部收集','先去合成其他人物吧');
    return;
  }
  const count=item.count||1;
  const gained=[];
  for(let i=0;i<count;i++){
    const target=pool[Math.floor(Math.random()*pool.length)];
    state.fragments[target.id]=(state.fragments[target.id]||0)+1;
    gained.push(target);
  }
  state.score-=item.cost;
  saveState();
  renderAll();
  showDrawPopup(gained);
  setTimeout(()=>checkAutoSynth(gained),100);
}

// ===== MISSIONS =====
function checkMission(mission){
  return mission.check(state);
}
function canClaimMission(mid){
  if(state.claimedMissions.includes(mid)) return false;
  const m=MISSIONS.find(x=>x.id===mid);
  return m && m.check(state);
}
function claimMission(mid){
  const m=MISSIONS.find(x=>x.id===mid);
  if(!m || !canClaimMission(mid)) return;
  state.claimedMissions.push(mid);
  state.score+=m.reward;
  saveState();
  renderAll();
  showToast('任务完成 +'+m.reward+'积分','「'+m.name+'」');
}

// ===== ACHIEVEMENTS =====
function checkAchievement(a){
  return a.check(state);
}
function canClaimAchievement(aid){
  if(state.claimedAchievements.includes(aid)) return false;
  const a=ACHIEVEMENTS.find(x=>x.id===aid);
  return a && a.check(state);
}
function claimAchievement(aid){
  const a=ACHIEVEMENTS.find(x=>x.id===aid);
  if(!a || !canClaimAchievement(aid)) return;
  state.claimedAchievements.push(aid);
  state.score+=a.reward;
  saveState();
  renderAll();
  fireConfetti(25);
  showToast('🏆 成就达成！ +'+a.reward+'积分','「'+a.name+'」');
}

// ===== RENDER =====
function renderAll(){
  renderStats();
  renderInvBar();
  renderChars();
  renderGallery();
  renderShop();
  renderMissions();
  renderAchievements();
}

function renderStats(){
  const totalFrags=Object.values(state.fragments).reduce((a,b)=>a+b,0)-state.synthesized.length*FRAGS_NEED;
  document.getElementById('statFrags').textContent=Math.max(0,totalFrags);
  document.getElementById('statChars').textContent=state.synthesized.length;
  document.getElementById('statScore').textContent=state.score;
  document.getElementById('shopScore').textContent=state.score;
}

function renderInvBar(){
  const bar=document.getElementById('invBar');
  const entries=Object.entries(state.fragments)
    .filter(([id,c])=>c>0 && !state.synthesized.includes(id))
    .sort((a,b)=>b[1]-a[1]).slice(0,40);
  if(entries.length===0){
    bar.innerHTML='<div class="inv-empty">暂无碎片，点击上方抽取</div>'; return;
  }
  bar.innerHTML=entries.map(([id,c])=>{
    const ch=CHARACTERS.find(x=>x.id===id);
    if(!ch) return '';
    return `<div class="inv-i ${ch.rarity}" title="${ch.name} ×${c}">${ch.emoji}${c}</div>`;
  }).join('');
}

let currentFaction='全部';

function renderChars(){
  const grid=document.getElementById('charGrid');
  const factionFilter=currentFaction==='全部'?CHARACTERS:CHARACTERS.filter(c=>c.faction===currentFaction);
  
  // Render faction tab buttons
  const tabContainer=document.querySelector('.tab-bar'); // reuse the tab bar
  // actually the faction filter needs its own sub-tabs
  let ftabs='<div style="display:flex;gap:4px;padding:0 0 8px;overflow-x:auto;flex-wrap:wrap">';
  FACTIONS.forEach(f=>{
    const active=f===currentFaction?'active':'';
    ftabs+=`<button class="ftab ${active}" data-f="${f}" style="padding:4px 10px;font-size:11px;${active?'color:#d4a843;border-bottom:2px solid #d4a843':'color:#5a4a3a'};background:none;border:none;cursor:pointer;flex-shrink:0;letter-spacing:1px;transition:.2s">${f}</button>`;
  });
  ftabs+='</div>';
  
  grid.innerHTML=ftabs+ factionFilter.map((c,i)=>{
    const fc=state.fragments[c.id]||0;
    const syn=state.synthesized.includes(c.id);
    const pct=Math.min(fc/FRAGS_NEED*100,100);
    const canSyn=fc>=FRAGS_NEED && !syn;
    return `<div class="char-card" data-id="${c.id}" style="animation-delay:${i*0.04}s">
      ${syn?'<div class="synth-badge">已合成</div>':''}
      <div class="av ${c.rarity}">${syn?c.emoji:'?'}</div>
      <div class="nm">${c.name}</div>
      <div class="tt">${c.title}</div>
      <div class="pb"><div class="pf ${c.rarity}" style="width:${syn?100:pct}%"></div></div>
      <div class="ct">碎片 <em>${syn?FRAGS_NEED:fc}</em> / ${FRAGS_NEED}</div>
      ${!syn && canSyn?`<button class="syn show ${c.rarity}" data-id="${c.id}">合 成</button>`:''}
    </div>`;
  }).join('');
  
  // Event handlers
  grid.querySelectorAll('.ftab').forEach(btn=>{
    btn.addEventListener('click',()=>{
      currentFaction=btn.dataset.f;
      renderChars();
      renderGallery();
    });
  });
  grid.querySelectorAll('.char-card').forEach(card=>{
    card.addEventListener('click',(e)=>{
      if(e.target.closest('.syn')) return;
      const id=card.dataset.id;
      openCharModal(id);
    });
  });
  grid.querySelectorAll('.syn').forEach(btn=>{
    btn.addEventListener('click',(e)=>{
      e.stopPropagation();
      synthesizeCharacter(btn.dataset.id);
    });
  });
  if(factionFilter.length===0){
    grid.innerHTML+=`<div class="empty-msg">该门派暂无人物</div>`;
  }
}

function renderGallery(){
  const container=document.getElementById('galleryGrid');
  if(state.synthesized.length===0){
    container.innerHTML='<div style="color:#3a2a1a;font-size:12px;text-align:center;padding:16px">尚未合成任何人物</div>';
    return;
  }
  container.innerHTML=state.synthesized.map((id,i)=>{
    const c=CHARACTERS.find(x=>x.id===id);
    if(!c) return '';
    return `<div class="g-item" style="animation-delay:${i*0.04}s" title="${c.name} · ${c.title}">
      ${c.emoji}
      <span class="gl">${c.name}</span>
    </div>`;
  }).join('');
}

function renderShop(){
  const grid=document.getElementById('shopGrid');
  grid.innerHTML=SHOP_ITEMS.map(item=>{
    const canBuy=state.score>=item.cost;
    return `<div class="shop-item">
      <div class="s-icon ${item.rarity}">${item.icon}</div>
      <div class="s-info">
        <div class="sn">${item.name}</div>
        <div class="sd">${item.desc}</div>
      </div>
      <button class="s-btn" data-id="${item.id}" ${canBuy?'':'disabled'}>${item.cost}分</button>
    </div>`;
  }).join('');
  grid.querySelectorAll('.s-btn:not([disabled])').forEach(btn=>{
    btn.addEventListener('click',()=>buyShopItem(btn.dataset.id));
  });
}

function renderMissions(){
  const list=document.getElementById('missionList');
  list.innerHTML=MISSIONS.map(m=>{
    const claimed=state.claimedMissions.includes(m.id);
    const done=m.check(state);
    const pct=Math.min(done?100:50,100);
    let statusCls,statusText;
    if(claimed){statusCls='done';statusText='✓ 已领';}
    else if(done){statusCls='pending';statusText='领取';}
    else{statusCls='locked';statusText='进行中';}
    return `<div class="mission-item">
      <div class="m-icon">📜</div>
      <div class="m-info">
        <div class="mn">${m.name}</div>
        <div class="md">${m.desc} · 奖励 ${m.reward} 积分</div>
        <div class="mp"><div class="mf" style="width:${pct}%"></div></div>
      </div>
      <div class="m-reward ${statusCls}" data-id="${m.id}" data-claim="${done&&!claimed}">${statusText}</div>
    </div>`;
  }).join('');
  list.querySelectorAll('.m-reward.pending').forEach(el=>{
    el.addEventListener('click',()=>claimMission(el.dataset.id));
  });
}

function renderAchievements(){
  const list=document.getElementById('achievementList');
  list.innerHTML=ACHIEVEMENTS.map(a=>{
    const claimed=state.claimedAchievements.includes(a.id);
    const done=a.check(state);
    const canClaim=done && !claimed;
    return `<div class="achi-item ${done?'done':''}">
      <div class="a-icon ${done?'':'locked'}">${done?'🏆':'🔒'}</div>
      <div class="a-info">
        <div class="an ${done?'done':''}">${a.name}</div>
        <div class="ad">${a.desc}</div>
      </div>
      <div class="a-badge">
        ${claimed?'✓':'奖励 <em>'+a.reward+'</em> 分'}
        ${canClaim?'<button class="claim-achi" style="margin-left:6px;padding:3px 8px;font-size:10px;border:1px solid #d4a843;border-radius:4px;background:rgba(212,168,67,0.1);color:#d4a843;cursor:pointer">领取</button>':''}
      </div>
    </div>`;
  }).join('');
  list.querySelectorAll('.claim-achi').forEach(btn=>{
    const parent=btn.closest('.achi-item');
    const idx=[...list.children].indexOf(parent);
    claimAchievement(ACHIEVEMENTS[idx].id);
  });
}

// ===== MODAL =====
function openCharModal(id){
  const c=CHARACTERS.find(x=>x.id===id);
  if(!c) return;
  const modal=document.getElementById('charModal');
  const fc=state.fragments[id]||0;
  const syn=state.synthesized.includes(id);
  const pct=Math.min(fc/FRAGS_NEED*100,100);
  document.getElementById('cmAv').className='m-av '+c.rarity;
  document.getElementById('cmAv').textContent=syn?c.emoji:'?';
  document.getElementById('cmName').textContent=c.name;
  document.getElementById('cmTitle').textContent=c.title+' · '+c.faction;
  document.getElementById('cmRarity').className='m-rarity '+c.rarity;
  document.getElementById('cmRarity').textContent=getRarity(c.rarity);
  document.getElementById('cmFrags').textContent=syn?FRAGS_NEED:fc;
  document.getElementById('cmFaction').textContent=c.faction;
  document.getElementById('cmStatus').textContent=syn?'已合成':'未合成';
  document.getElementById('cmStatus').style.color=syn?'#d4a843':'#6a5a4a';
  document.getElementById('cmSkill').textContent=c.skill;
  document.getElementById('cmSkillDesc').textContent=c.skillDesc;
  document.getElementById('cmDesc').textContent=c.desc;
  const btn=document.getElementById('cmSynthBtn');
  btn.className='m-synth '+c.rarity;
  if(syn){
    btn.textContent='✓ 已合成';
    btn.disabled=true;
    btn.className+=' done';
  }else if(fc>=FRAGS_NEED){
    btn.textContent='合 成';
    btn.disabled=false;
    btn.className+=' ok';
    btn.onclick=()=>synthesizeCharacter(id);
  }else{
    btn.textContent='碎片不足';
    btn.disabled=true;
  }
  document.getElementById('cmPbar').style.width=pct+'%';
  document.getElementById('cmPbar').className='mpf '+c.rarity;
  document.getElementById('cmPcount').textContent=(syn?FRAGS_NEED:fc)+' / '+FRAGS_NEED;
  modal.classList.add('show');
}

function closeCharModal(){
  document.getElementById('charModal').classList.remove('show');
}
document.getElementById('charModal').addEventListener('click',(e)=>{
  if(e.target===e.currentTarget) closeCharModal();
});

// ===== UI =====
function showToast(title,sub='',dur=2000){
  const old=document.querySelector('.toast');
  if(old) old.remove();
  const t=document.createElement('div');
  t.className='toast';
  t.innerHTML=title+(sub?'<div class="ts">'+sub+'</div>':'');
  document.body.appendChild(t);
  setTimeout(()=>{t.classList.add('out');setTimeout(()=>t.remove(),350)},dur);
}

function fireConfetti(count=30){
  const c=document.createElement('div');
  c.className='confetti';
  const colors=['#d4a843','#c41e3a','#f0e6d3','#8b6914','#6b4fa8','#4a8a4a'];
  for(let i=0;i<count;i++){
    const p=document.createElement('div');
    p.className='c';
    p.style.left=Math.random()*100+'vw';
    p.style.animationDuration=(1.5+Math.random()*2)+'s';
    p.style.animationDelay=Math.random()*0.5+'s';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.width=(4+Math.random()*5)+'px';
    p.style.height=p.style.width;
    p.style.borderRadius=Math.random()>0.5?'50%':'2px';
    c.appendChild(p);
  }
  document.body.appendChild(c);
  setTimeout(()=>c.remove(),4000);
}

// ===== TABS =====
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
  });
});

// ===== DRAW BUTTONS =====
document.getElementById('btnDraw1').addEventListener('click',()=>doDraw(1));
document.getElementById('btnDraw10').addEventListener('click',()=>doDraw(10));

// ===== KEYBOARD =====
document.addEventListener('keydown',(e)=>{
  if(e.key==='Escape'){closeCharModal();closeDrawPopup();}
});

// ===== INIT =====
initState();
renderAll();
</script>
</body>
</html>
