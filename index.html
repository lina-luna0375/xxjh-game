<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>笑傲江湖 · 碎片合成</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(212,168,67,.3)}50%{box-shadow:0 0 24px rgba(212,168,67,.8)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes drawReveal{0%{transform:rotateY(0) scale(0.3);opacity:0}50%{transform:rotateY(180deg) scale(1.1);opacity:1}100%{transform:rotateY(360deg) scale(1);opacity:1}}
@keyframes sparkle{0%{transform:translate(0,0) scale(0);opacity:1}100%{transform:translate(var(--x),var(--y)) scale(1);opacity:0}}
@keyframes synthesize{0%{transform:scale(1);filter:brightness(1)}25%{transform:scale(1.2);filter:brightness(1.5)}50%{transform:scale(1.3);filter:brightness(2)}75%{transform:scale(1.1);filter:brightness(1.2)}100%{transform:scale(1);filter:brightness(1)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastIn{0%{opacity:0;transform:translate(-50%,20px) scale(0.8)}100%{opacity:1;transform:translate(-50%,0) scale(1)}}
@keyframes toastOut{0%{opacity:1;transform:translate(-50%,0) scale(1)}100%{opacity:0;transform:translate(-50%,-20px) scale(0.8)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes confettiFall{0%{transform:translateY(-100vh) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
body{font-family:'Microsoft YaHei','PingFang SC','Noto Sans SC',sans-serif;background:#0d0602;color:#f0e6d3;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(139,0,0,0.15) 0%,transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(80,40,0,0.1) 0%,transparent 50%);pointer-events:none;z-index:0}
.bg-pattern{position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4a843' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");pointer-events:none;z-index:0}

/* scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#1a0a00}
::-webkit-scrollbar-thumb{background:#8b6914;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#d4a843}

/* header */
.header{position:relative;z-index:1;text-align:center;padding:28px 16px 18px;border-bottom:1px solid rgba(212,168,67,0.2);background:linear-gradient(180deg,rgba(30,10,0,0.95) 0%,rgba(13,6,2,0.95) 100%)}
.header h1{font-size:28px;font-weight:700;letter-spacing:8px;background:linear-gradient(135deg,#f0e6d3 0%,#d4a843 50%,#f0e6d3 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .subtitle{font-size:13px;color:#8b7355;letter-spacing:4px;margin-top:4px}
.header .stats{display:flex;justify-content:center;gap:28px;margin-top:12px;font-size:14px}
.header .stats span{color:#b8a07a}
.header .stats em{font-style:normal;color:#d4a843;font-weight:700}

/* draw section */
.draw-section{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:22px 16px 18px;border-bottom:1px solid rgba(212,168,67,0.1)}
.draw-btn{position:relative;width:220px;height:56px;border:2px solid #d4a843;border-radius:28px;background:linear-gradient(135deg,rgba(180,50,30,0.3),rgba(139,0,0,0.4));color:#f0e6d3;font-size:20px;font-weight:700;letter-spacing:6px;cursor:pointer;transition:all .3s;overflow:hidden}
.draw-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(212,168,67,0.15),transparent);background-size:200% 100%;animation:shimmer 2.5s infinite;pointer-events:none}
.draw-btn:hover{background:linear-gradient(135deg,rgba(180,50,30,0.5),rgba(139,0,0,0.6));box-shadow:0 0 25px rgba(212,168,67,0.3);transform:translateY(-2px)}
.draw-btn:active{transform:translateY(0)}
.draw-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.draw-btn .cost{display:block;font-size:11px;font-weight:400;letter-spacing:2px;color:#b8a07a;margin-top:-2px}
.draw-result{position:relative;z-index:1;display:none;align-items:center;gap:14px;margin-top:16px;padding:12px 20px;background:rgba(30,15,5,0.8);border:1px solid rgba(212,168,67,0.3);border-radius:12px;animation:fadeInUp .4s ease}
.draw-result.show{display:flex}
.draw-result .frag-icon{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0}
.draw-result .frag-icon.legendary{background:linear-gradient(135deg,#d4a843,#8b6914);color:#1a0a00}
.draw-result .frag-icon.rare{background:linear-gradient(135deg,#6b4fa8,#48347a);color:#e0d0ff}
.draw-result .frag-icon.common{background:linear-gradient(135deg,#5a7a5a,#3a5a3a);color:#c0e0c0}
.draw-result .frag-info{display:flex;flex-direction:column}
.draw-result .frag-info .name{font-size:15px;font-weight:700}
.draw-result .frag-info .detail{font-size:12px;color:#8b7355}
.draw-result .frag-info .badge{display:inline-block;font-size:10px;padding:1px 8px;border-radius:8px;margin-top:2px;width:fit-content}
.draw-result .frag-info .badge.legendary{background:rgba(212,168,67,0.2);color:#d4a843;border:1px solid rgba(212,168,67,0.4)}
.draw-result .frag-info .badge.rare{background:rgba(107,79,168,0.2);color:#b898e8;border:1px solid rgba(107,79,168,0.4)}
.draw-result .frag-info .badge.common{background:rgba(90,122,90,0.2);color:#8aba8a;border:1px solid rgba(90,122,90,0.4)}

/* inventory strip */
.inv-strip{position:relative;z-index:1;display:flex;gap:4px;padding:8px 16px;overflow-x:auto;justify-content:center;flex-wrap:wrap;max-width:600px;margin:6px auto 0}
.inv-strip .inv-item{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:default;transition:transform .2s;flex-shrink:0}
.inv-strip .inv-item:hover{transform:scale(1.15)}
.inv-strip .inv-item.legendary{background:linear-gradient(135deg,#d4a843,#8b6914);color:#1a0a00;border:1px solid rgba(212,168,67,0.5)}
.inv-strip .inv-item.rare{background:linear-gradient(135deg,#6b4fa8,#48347a);color:#e0d0ff;border:1px solid rgba(107,79,168,0.5)}
.inv-strip .inv-item.common{background:linear-gradient(135deg,#5a7a5a,#3a5a3a);color:#c0e0c0;border:1px solid rgba(90,122,90,0.5)}
.inv-empty{color:#5a4a3a;font-size:12px;text-align:center;padding:4px}

/* tabs */
.tabs{position:relative;z-index:1;display:flex;justify-content:center;gap:2px;padding:14px 12px 0;flex-wrap:wrap}
.tab-btn{padding:8px 16px;font-size:13px;font-weight:600;letter-spacing:1px;background:rgba(30,15,5,0.5);border:1px solid rgba(212,168,67,0.15);border-bottom:none;border-radius:8px 8px 0 0;color:#8b7355;cursor:pointer;transition:all .2s}
.tab-btn:hover{color:#d4a843;background:rgba(40,20,8,0.6)}
.tab-btn.active{color:#f0e6d3;background:rgba(40,20,8,0.8);border-color:rgba(212,168,67,0.4);position:relative}
.tab-btn.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:rgba(40,20,8,0.8)}

/* character grid */
.grid-section{position:relative;z-index:1;padding:0 12px 60px;max-width:960px;margin:0 auto}
.char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;padding:14px 0}
.char-card{position:relative;background:linear-gradient(145deg,rgba(30,15,5,0.9),rgba(20,10,3,0.95));border:1px solid rgba(212,168,67,0.15);border-radius:10px;padding:12px 10px 10px;text-align:center;cursor:pointer;transition:all .3s;animation:fadeInUp .35s ease both}
.char-card:hover{border-color:rgba(212,168,67,0.4);transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,0.4)}
.char-card .avatar{width:54px;height:54px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:24px;border:2px solid rgba(212,168,67,0.3);background:rgba(30,15,5,0.8);position:relative;overflow:hidden}
.char-card .avatar.legendary{border-color:#d4a843;box-shadow:0 0 12px rgba(212,168,67,0.2)}
.char-card .avatar.rare{border-color:#6b4fa8;box-shadow:0 0 10px rgba(107,79,168,0.15)}
.char-card .avatar.common{border-color:#5a7a5a}
.char-card .name{font-size:14px;font-weight:700;margin-bottom:2px}
.char-card .title{font-size:10px;color:#6a5a4a;margin-bottom:6px}
.char-card .faction-tag{font-size:9px;color:#8b7355;margin-bottom:6px}
.char-card .progress-wrap{position:relative;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;margin:6px 8px 0;overflow:hidden}
.char-card .progress-fill{height:100%;border-radius:2px;transition:width .4s ease}
.char-card .progress-fill.legendary{background:linear-gradient(90deg,#8b6914,#d4a843)}
.char-card .progress-fill.rare{background:linear-gradient(90deg,#48347a,#8b6fc8)}
.char-card .progress-fill.common{background:linear-gradient(90deg,#3a5a3a,#7aaa7a)}
.char-card .count{font-size:12px;color:#8b7355;margin-top:4px}
.char-card .count em{font-style:normal;color:#d4a843;font-weight:700}
.char-card .synthesized-badge{position:absolute;top:6px;right:6px;background:linear-gradient(135deg,#d4a843,#b8860b);color:#1a0a00;font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;letter-spacing:1px}
.char-card .synth-btn{display:none;margin-top:6px;padding:4px 14px;font-size:12px;font-weight:700;letter-spacing:2px;border:none;border-radius:6px;cursor:pointer;transition:all .3s;animation:pulse 1.5s infinite}
.char-card .synth-btn.show{display:inline-block}
.char-card .synth-btn.legendary{background:linear-gradient(135deg,#d4a843,#b8860b);color:#1a0a00}
.char-card .synth-btn.rare{background:linear-gradient(135deg,#8b6fc8,#6b4fa8);color:#f0e6d3}
.char-card .synth-btn.common{background:linear-gradient(135deg,#7aaa7a,#5a8a5a);color:#1a0a00}
.char-card .synth-btn:hover{filter:brightness(1.2);transform:scale(1.05)}

/* synthesized gallery */
.gallery{position:relative;z-index:1;padding:0 16px 40px;max-width:960px;margin:0 auto}
.gallery h3{text-align:center;font-size:16px;letter-spacing:4px;color:#8b7355;padding-bottom:14px;border-bottom:1px solid rgba(212,168,67,0.1);margin-bottom:14px}
.gallery .gallery-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.gallery .gallery-item{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;border:2px solid #d4a843;background:linear-gradient(135deg,rgba(30,15,5,0.9),rgba(40,20,8,0.9));box-shadow:0 0 10px rgba(212,168,67,0.15);animation:fadeInUp .4s ease both;position:relative;transition:transform .2s}
.gallery .gallery-item:hover{transform:scale(1.1)}
.gallery .gallery-item .g-name{position:absolute;bottom:-18px;font-size:9px;color:#b8a07a;white-space:nowrap;pointer-events:none}
.gallery-empty{text-align:center;color:#4a3a2a;font-size:13px;padding:20px;font-style:italic}

/* toast */
.toast{position:fixed;top:40%;left:50%;z-index:100;transform:translate(-50%,0);padding:14px 28px;background:linear-gradient(135deg,rgba(30,15,5,0.95),rgba(20,10,3,0.98));border:1px solid #d4a843;border-radius:12px;color:#f0e6d3;font-size:18px;font-weight:700;letter-spacing:4px;box-shadow:0 0 40px rgba(212,168,67,0.2);animation:toastIn .4s ease;pointer-events:none;text-align:center;min-width:200px}
.toast .toast-sub{font-size:12px;font-weight:400;color:#8b7355;letter-spacing:2px;margin-top:4px}
.toast.out{animation:toastOut .4s ease forwards}

/* confetti */
.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:99;overflow:hidden}
.confetti-piece{position:absolute;top:0;left:var(--cl);width:8px;height:8px;border-radius:2px;animation:confettiFall var(--cd) linear forwards;animation-delay:var(--dl);opacity:0}

/* responsive */
@media(max-width:540px){
  .header h1{font-size:22px;letter-spacing:4px}
  .char-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
  .draw-btn{width:180px;height:48px;font-size:17px}
  .char-card .avatar{width:44px;height:44px;font-size:20px}
  .gallery .gallery-item{width:50px;height:50px;font-size:18px}
}

/* empty tab fallback */
.empty-tab{text-align:center;padding:40px 16px;color:#4a3a2a;font-size:14px}
</style>
</head>
<body>

<div class="header">
  <h1>笑傲江湖</h1>
  <div class="subtitle">碎 片 合 成</div>
  <div class="stats">
    <span>已收集 <em id="totalCollected">0</em> / <em id="totalChars">21</em></span>
    <span>碎片 <em id="totalFrags">0</em></span>
  </div>
</div>

<div class="draw-section">
  <button class="draw-btn" id="drawBtn">
    抽取碎片
    <span class="cost">─ 点击获得随机碎片 ─</span>
  </button>
  <div class="draw-result" id="drawResult">
    <div class="frag-icon" id="fragIcon">?</div>
    <div class="frag-info">
      <div class="name" id="fragName">—</div>
      <div class="detail" id="fragDetail">—</div>
      <div class="badge" id="fragBadge">—</div>
    </div>
  </div>
  <div class="inv-strip" id="invStrip">
    <div class="inv-empty">暂无碎片，点击上方抽取</div>
  </div>
</div>

<div class="tabs" id="tabs"></div>

<div class="grid-section">
  <div class="char-grid" id="charGrid"></div>
</div>

<div class="gallery">
  <h3>─ 已 合 成 ─</h3>
  <div class="gallery-grid" id="galleryGrid">
    <div class="gallery-empty">尚未合成任何人物，收集碎片合成吧</div>
  </div>
</div>

<script>
const CHARACTERS = [
  // 华山派
  {id:'lhc',name:'令狐冲',faction:'华山派',rarity:'legendary',title:'华山大师兄',emoji:'⚔️'},
  {id:'ybq',name:'岳不群',faction:'华山派',rarity:'rare',title:'华山掌门',emoji:'🎭'},
  {id:'nzz',name:'宁中则',faction:'华山派',rarity:'rare',title:'华山师母',emoji:'🌺'},
  {id:'yls',name:'岳灵珊',faction:'华山派',rarity:'common',title:'华山小师妹',emoji:'🌸'},
  {id:'fqy',name:'风清扬',faction:'华山派',rarity:'legendary',title:'华山太师叔',emoji:'🌊'},
  {id:'ldn',name:'劳德诺',faction:'华山派',rarity:'common',title:'华山二师兄',emoji:'🐍'},
  {id:'lpz',name:'林平之',faction:'华山派',rarity:'rare',title:'华山弟子',emoji:'🗡️'},
  // 日月神教
  {id:'dfbb',name:'东方不败',faction:'日月神教',rarity:'legendary',title:'日月教主',emoji:'🪷'},
  {id:'ryy',name:'任盈盈',faction:'日月神教',rarity:'rare',title:'日月圣姑',emoji:'🎵'},
  {id:'rwx',name:'任我行',faction:'日月神教',rarity:'legendary',title:'前教主',emoji:'👑'},
  {id:'xwt',name:'向问天',faction:'日月神教',rarity:'rare',title:'光明左使',emoji:'🍷'},
  {id:'lfh',name:'蓝凤凰',faction:'日月神教',rarity:'common',title:'五毒教主',emoji:'🦋'},
  // 恒山派
  {id:'dys',name:'定逸师太',faction:'恒山派',rarity:'common',title:'恒山掌门',emoji:'📿'},
  {id:'yl',name:'仪琳',faction:'恒山派',rarity:'rare',title:'恒山弟子',emoji:'🙏'},
  {id:'bj',name:'不戒和尚',faction:'恒山派',rarity:'common',title:'仪琳之父',emoji:'🍺'},
  // 嵩山派
  {id:'zlc',name:'左冷禅',faction:'嵩山派',rarity:'rare',title:'嵩山掌门',emoji:'❄️'},
  {id:'lb',name:'陆柏',faction:'嵩山派',rarity:'common',title:'嵩山高手',emoji:'⚡'},
  // 衡山派
  {id:'md',name:'莫大',faction:'衡山派',rarity:'common',title:'衡山掌门',emoji:'🎻'},
  {id:'lzf',name:'刘正风',faction:'衡山派',rarity:'common',title:'衡山高手',emoji:'🌿'},
  // 泰山派
  {id:'tm',name:'天门道人',faction:'泰山派',rarity:'common',title:'泰山掌门',emoji:'⛰️'},
  // 散人
  {id:'tbg',name:'田伯光',faction:'散人',rarity:'common',title:'万里独行',emoji:'🏃'},
];

const FACTIONS = ['全部','华山派','日月神教','恒山派','嵩山派','衡山派','泰山派','散人'];
const RARITY_WEIGHTS = {legendary:0.12,rare:0.32,common:0.56};
const FRAGS_NEEDED = 5;
const ANIM_DELAY = 140;

let state = {fragments:{},synthesized:[],totalDraws:0};

function initState(){
  const saved = localStorage.getItem('xxjf_game');
  if(saved){
    try{
      const s = JSON.parse(saved);
      state.fragments = s.fragments || {};
      state.synthesized = s.synthesized || [];
      state.totalDraws = s.totalDraws || 0;
      return;
    }catch(e){}
  }
  CHARACTERS.forEach(c => { state.fragments[c.id] = 0; });
}

function saveState(){
  localStorage.setItem('xxjf_game',JSON.stringify({
    fragments:state.fragments,
    synthesized:state.synthesized,
    totalDraws:state.totalDraws
  }));
}

let currentFaction = '全部';

function getCharsByFaction(faction){
  if(faction==='全部') return CHARACTERS;
  return CHARACTERS.filter(c => c.faction===faction);
}

function getRarityLabel(r){
  return {legendary:'传说',rare:'稀有',common:'普通'}[r]||'普通';
}

function drawFragment(){
  const r = Math.random();
  let chosenRarity;
  if(r<RARITY_WEIGHTS.legendary) chosenRarity='legendary';
  else if(r<RARITY_WEIGHTS.legendary+RARITY_WEIGHTS.rare) chosenRarity='rare';
  else chosenRarity='common';

  const pool = CHARACTERS.filter(c => c.rarity===chosenRarity && !state.synthesized.includes(c.id));
  if(pool.length===0){
    const fallback = CHARACTERS.filter(c => !state.synthesized.includes(c.id));
    if(fallback.length===0) return null;
    return fallback[Math.floor(Math.random()*fallback.length)];
  }
  return pool[Math.floor(Math.random()*pool.length)];
}

function showDrawResult(char){
  const el = document.getElementById('drawResult');
  const icon = document.getElementById('fragIcon');
  const name = document.getElementById('fragName');
  const detail = document.getElementById('fragDetail');
  const badge = document.getElementById('fragBadge');
  icon.className = 'frag-icon '+char.rarity;
  icon.textContent = char.emoji;
  name.textContent = char.name;
  detail.textContent = char.title + ' · ' + char.faction;
  badge.className = 'badge '+char.rarity;
  badge.textContent = getRarityLabel(char.rarity);
  el.style.animation='none';
  el.offsetHeight;
  el.style.animation='fadeInUp .4s ease';
  el.classList.add('show');
}

function showToast(title,sub='',duration=2000){
  const old = document.querySelector('.toast');
  if(old) old.remove();
  const t = document.createElement('div');
  t.className='toast';
  t.innerHTML=title+(sub?'<div class="toast-sub">'+sub+'</div>':'');
  document.body.appendChild(t);
  setTimeout(()=>{t.classList.add('out');setTimeout(()=>t.remove(),400)},duration);
}

function fireConfetti(count=30){
  const container = document.createElement('div');
  container.className='confetti-container';
  const colors=['#d4a843','#c41e3a','#f0e6d3','#8b6914','#6b4fa8','#4a8a4a'];
  for(let i=0;i<count;i++){
    const piece = document.createElement('div');
    piece.className='confetti-piece';
    piece.style.setProperty('--cl',(Math.random()*100)+'vw');
    piece.style.setProperty('--cd',(1.5+Math.random()*2)+'s');
    piece.style.setProperty('--dl',(Math.random()*0.6)+'s');
    piece.style.background=colors[Math.floor(Math.random()*colors.length)];
    const size=4+Math.random()*6;
    piece.style.width=size+'px';
    piece.style.height=size+'px';
    piece.style.borderRadius=Math.random()>0.5?'50%':'2px';
    container.appendChild(piece);
  }
  document.body.appendChild(container);
  setTimeout(()=>container.remove(),4000);
}

function synthesizeCharacter(char){
  state.fragments[char.id] = Math.max(0, state.fragments[char.id] - FRAGS_NEEDED);
  state.synthesized.push(char.id);
  saveState();
  renderAll();
  showToast('✦ '+char.name+' ✦','人物已合成！',2200);
  fireConfetti(45);
}

function handleDraw(){
  const btn = document.getElementById('drawBtn');
  btn.disabled = true;
  
  const unsynthesized = CHARACTERS.filter(c => !state.synthesized.includes(c.id));
  if(unsynthesized.length===0){
    showToast('🎉 全部收集完成！','你已经集齐了所有人物',2500);
    btn.disabled = false;
    return;
  }

  const char = drawFragment();
  if(!char){
    showToast('暂无更多碎片可抽取','所有人物已合成',2000);
    btn.disabled = false;
    return;
  }

  state.fragments[char.id] = (state.fragments[char.id]||0) + 1;
  state.totalDraws++;
  showDrawResult(char);
  saveState();
  renderAll();

  if(state.fragments[char.id] >= FRAGS_NEEDED){
    setTimeout(()=>{
      showToast('✦ 可合成 '+char.name+' ✦','点击人物卡上的「合成」按钮',1800);
    },500);
  }

  setTimeout(()=>{btn.disabled=false},400);
}

function renderTabs(){
  const container = document.getElementById('tabs');
  container.innerHTML = FACTIONS.map(f => 
    `<button class="tab-btn${f===currentFaction?' active':''}" data-faction="${f}">${f}</button>`
  ).join('');
  container.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click',()=>{
      currentFaction = btn.dataset.faction;
      renderAll();
    });
  });
}

function renderGrid(){
  const grid = document.getElementById('charGrid');
  const chars = getCharsByFaction(currentFaction);
  
  if(chars.length===0){
    grid.innerHTML = '<div class="empty-tab">该门派暂无人物</div>';
    return;
  }

  grid.innerHTML = chars.map((char,i) => {
    const fragCount = state.fragments[char.id]||0;
    const syn = state.synthesized.includes(char.id);
    const progress = Math.min(fragCount / FRAGS_NEEDED * 100, 100);
    const canSyn = fragCount >= FRAGS_NEEDED && !syn;
    
    return `
      <div class="char-card" data-id="${char.id}" style="animation-delay:${i*0.04}s">
        ${syn?'<div class="synthesized-badge">已合成</div>':''}
        <div class="avatar ${char.rarity}">${syn?char.emoji:'?'}</div>
        <div class="name">${char.name}</div>
        <div class="title">${char.title}</div>
        <div class="faction-tag">${char.faction}</div>
        <div class="progress-wrap">
          <div class="progress-fill ${char.rarity}" style="width:${syn?100:progress}%"></div>
        </div>
        <div class="count">碎片 <em>${syn?FRAGS_NEEDED+'/'+FRAGS_NEEDED:fragCount}</em> / ${FRAGS_NEEDED}</div>
        ${!syn && canSyn ? `<button class="synth-btn show ${char.rarity}" data-id="${char.id}">合 成</button>` : 
          !syn ? `<button class="synth-btn ${char.rarity}" data-id="${char.id}" style="display:none">合 成</button>` : ''}
      </div>
    `;
  }).join('');

  grid.querySelectorAll('.synth-btn.show').forEach(btn => {
    btn.addEventListener('click',(e)=>{
      e.stopPropagation();
      const id = btn.dataset.id;
      const char = CHARACTERS.find(c => c.id===id);
      if(char) synthesizeCharacter(char);
    });
  });
}

function renderGallery(){
  const container = document.getElementById('galleryGrid');
  if(state.synthesized.length===0){
    container.innerHTML = '<div class="gallery-empty">尚未合成任何人物，收集碎片合成吧</div>';
    return;
  }
  container.innerHTML = state.synthesized.map((id,i) => {
    const char = CHARACTERS.find(c => c.id===id);
    if(!char) return '';
    return `<div class="gallery-item" style="animation-delay:${i*0.06}s" title="${char.name} · ${char.title}">
      ${char.emoji}
      <span class="g-name">${char.name}</span>
    </div>`;
  }).join('');
}

function renderInvStrip(){
  const container = document.getElementById('invStrip');
  const frags = Object.entries(state.fragments)
    .filter(([id,c]) => c>0 && !state.synthesized.includes(id))
    .sort((a,b) => b[1]-a[1])
    .slice(0,30);

  if(frags.length===0){
    container.innerHTML = '<div class="inv-empty">暂无碎片，点击上方抽取</div>';
    return;
  }

  container.innerHTML = frags.map(([id,count]) => {
    const char = CHARACTERS.find(c => c.id===id);
    if(!char) return '';
    return `<div class="inv-item ${char.rarity}" title="${char.name} ×${count}">${char.emoji}${count}</div>`;
  }).join('');
}

function renderStats(){
  document.getElementById('totalCollected').textContent = state.synthesized.length;
  document.getElementById('totalChars').textContent = CHARACTERS.length;
  const totalFrags = Object.values(state.fragments).reduce((a,b)=>a+b,0) - 
    state.synthesized.length * FRAGS_NEEDED;
  document.getElementById('totalFrags').textContent = Math.max(0, totalFrags);
}

function renderAll(){
  renderTabs();
  renderGrid();
  renderGallery();
  renderInvStrip();
  renderStats();
}

// init
initState();
renderAll();
document.getElementById('drawBtn').addEventListener('click',handleDraw);
</script>
</body>
</html>
